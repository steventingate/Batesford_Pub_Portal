<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Batesford BI — Project Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F5F3;
    --card:#FFFFFF;
    --line:#E7E9E6;
    --text:#16191A;
    --text-dim:#6B7270;
    --green:#1C8A4B;
    --green-soft:#E6F4EB;
    --amber:#B8762E;
    --amber-soft:#FBF0E2;
    --red:#C0473B;
    --red-soft:#FBEAE8;
    --blue:#3158C4;
    --blue-soft:#EAEEFB;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;}
  header{padding:28px 36px 18px; max-width:1180px; margin:0 auto;}
  .eyebrow{font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-dim); font-weight:600;}
  h1{font-family:'Space Grotesk',sans-serif; font-size:1.7rem; margin:4px 0 2px; font-weight:600;}
  header p{color:var(--text-dim); margin:0; font-size:0.9rem;}

  .wrap{max-width:1180px; margin:0 auto; padding:0 36px 80px;}

  .summary-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin:22px 0 28px;}
  .summary{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px 20px;}
  .summary .lbl{font-size:0.72rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-dim); margin-bottom:8px;}
  .summary .val{font-family:'Space Grotesk',sans-serif; font-size:1.55rem; font-weight:600;}
  .summary .sub{font-family:'IBM Plex Mono',monospace; font-size:0.72rem; color:var(--text-dim); margin-top:4px;}
  .progress-track{height:6px; background:var(--line); border-radius:4px; overflow:hidden; margin-top:10px;}
  .progress-fill{height:100%; background:var(--green); border-radius:4px; transition:width .3s;}

  .phase{background:var(--card); border:1px solid var(--line); border-radius:16px; margin-bottom:14px; overflow:hidden;}
  .phase-head{display:flex; align-items:center; gap:16px; padding:18px 22px; cursor:pointer;}
  .phase-num{
    width:34px; height:34px; border-radius:10px; background:var(--green-soft); color:var(--green);
    display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:0.8rem; font-weight:600; flex-shrink:0;
  }
  .phase-head.done .phase-num{background:var(--green); color:#fff;}
  .phase-title{flex:1; min-width:0;}
  .phase-title h3{font-family:'Space Grotesk',sans-serif; font-size:1rem; margin:0 0 2px; font-weight:600; outline:none; border-radius:4px; padding:1px 3px; margin-left:-3px;}
  .phase-title h3:focus{background:var(--bg); box-shadow:0 0 0 2px var(--blue-soft);}
  .phase-title .meta{font-size:0.78rem; color:var(--text-dim);}
  .phase-actions-row{display:flex; justify-content:flex-end; margin-top:16px;}
  .delete-phase-btn{
    border:none; background:none; color:var(--red); font-size:0.78rem; cursor:pointer; padding:6px 4px;
    font-family:'Inter',sans-serif; text-decoration:underline;
  }
  .add-phase-btn{
    width:100%; border:1.5px dashed var(--line); background:transparent; color:var(--text-dim);
    border-radius:16px; padding:16px; font-size:0.88rem; font-weight:600; cursor:pointer; margin-top:6px;
    font-family:'Inter',sans-serif;
  }
  .add-phase-btn:hover{border-color:var(--green); color:var(--green); background:var(--green-soft);}
  .phase-budget{text-align:right; font-family:'IBM Plex Mono',monospace; font-size:0.8rem; flex-shrink:0;}
  .phase-budget .b{color:var(--text-dim); font-size:0.7rem;}
  .status-pill{
    font-size:0.7rem; font-weight:600; padding:4px 11px; border-radius:20px; white-space:nowrap; flex-shrink:0;
    border:none; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .status-pill.not_started{background:var(--line); color:var(--text-dim);}
  .status-pill.in_progress{background:var(--amber-soft); color:var(--amber);}
  .status-pill.done{background:var(--green-soft); color:var(--green);}
  .chev{color:var(--text-dim); transition:transform .2s; flex-shrink:0;}
  .phase.open .chev{transform:rotate(90deg);}

  .phase-body{display:none; padding:0 22px 22px; border-top:1px solid var(--line);}
  .phase.open .phase-body{display:block;}

  .body-grid{display:grid; grid-template-columns:1.3fr 1fr; gap:24px; margin-top:18px;}
  .tasks{display:flex; flex-direction:column; gap:8px;}
  .task{display:flex; align-items:flex-start; gap:10px; font-size:0.86rem; padding:8px 10px; border-radius:8px; background:var(--bg);}
  .task input[type=checkbox]{width:16px; height:16px; accent-color:var(--green); cursor:pointer; margin-top:2px;}
  .task.checked .task-title{color:var(--text-dim); text-decoration:line-through;}
  .task-body{flex:1; min-width:0;}
  .task-title{cursor:pointer; display:block;}
  .task-note{
    width:100%; border:none; background:transparent; font-size:0.78rem; color:var(--text-dim);
    padding:4px 0 0; resize:none; font-family:'Inter',sans-serif; min-height:18px;
  }
  .task-note:focus{color:var(--text); outline:none;}
  .task-note::placeholder{color:#A9AFA9;}

  .side-block{display:flex; flex-direction:column; gap:14px;}
  .field-row{display:flex; align-items:center; justify-content:space-between; font-size:0.84rem;}
  .field-row .flbl{color:var(--text-dim);}
  .spend-input{
    width:110px; border:1px solid var(--line); border-radius:8px; padding:6px 9px; font-family:'IBM Plex Mono',monospace;
    font-size:0.82rem; text-align:right; background:var(--bg); color:var(--text);
  }
  .time-log{border-top:1px solid var(--line); padding-top:12px;}
  .time-entries{display:flex; flex-direction:column; gap:6px; max-height:130px; overflow-y:auto; margin-bottom:10px;}
  .time-entry{display:flex; justify-content:space-between; font-size:0.78rem; color:var(--text-dim); padding:4px 0;}
  .time-entry .h{font-family:'IBM Plex Mono',monospace; color:var(--text); font-weight:500;}
  .add-time{display:flex; gap:6px;}
  .add-time input{border:1px solid var(--line); border-radius:8px; padding:6px 9px; font-size:0.8rem; background:var(--bg); color:var(--text);}
  .add-time input[type=number]{width:60px;}
  .add-time input[type=text]{flex:1; min-width:0;}
  .add-time button{
    border:none; background:var(--green); color:#fff; border-radius:8px; padding:6px 12px; font-size:0.78rem; cursor:pointer; font-weight:600;
  }
  .notes-area{
    width:100%; border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:0.82rem; font-family:'Inter',sans-serif;
    background:var(--bg); color:var(--text); resize:vertical; min-height:60px;
  }
  .add-task-row{display:flex; gap:6px; margin-top:10px; flex-wrap:wrap;}
  .add-task-row input{flex:1; min-width:120px; border:1px solid var(--line); border-radius:8px; padding:7px 10px; font-size:0.82rem; background:var(--bg); color:var(--text);}
  .add-task-row button{border:none; background:var(--blue); color:#fff; border-radius:8px; padding:7px 13px; font-size:0.78rem; cursor:pointer; font-weight:600;}

  .save-indicator{
    position:fixed; bottom:18px; right:18px; background:var(--text); color:#fff; font-size:0.75rem;
    padding:8px 14px; border-radius:20px; opacity:0; transition:opacity .3s; font-family:'IBM Plex Mono',monospace;
  }
  .save-indicator.show{opacity:0.85;}

  @media (max-width:760px){
    header, .wrap{padding-left:14px; padding-right:14px;}
    header{padding-top:20px;}
    h1{font-size:1.35rem;}
    .summary-row{grid-template-columns:1fr 1fr; gap:10px;}
    .summary{padding:14px 16px;}
    .summary .val{font-size:1.25rem;}
    .body-grid{grid-template-columns:1fr;}
    .phase-head{
      flex-wrap:wrap; padding:14px 16px; gap:10px;
      align-items:flex-start;
    }
    .phase-num{width:28px; height:28px; font-size:0.72rem;}
    .phase-title{flex-basis:100%; order:1;}
    .phase-title h3{font-size:0.94rem;}
    .status-pill{order:2;}
    .phase-budget{order:3; text-align:left; margin-left:auto;}
    .chev{order:4; align-self:center;}
    .phase-body{padding:0 16px 18px;}
    .add-task-row{flex-direction:column;}
    .add-task-row input{width:100%;}
    .add-time{flex-wrap:wrap;}
    .add-time input[type=number]{width:70px;}
    .add-time input[type=text]{flex:1 1 100%;}
    .add-time button{flex:1;}
  }
</style>
</head>
<body>
<header>
  <div class="eyebrow">Geared IT · Internal</div>
  <h1>Batesford Hotel — BI Platform Tracker</h1>
  <p>Project roadmap, spend, and time tracking across all phases</p>
</header>

<div class="wrap">
  <div class="summary-row" id="summaryRow"></div>
  <div id="phaseList"></div>
</div>

<div class="save-indicator" id="saveIndicator">Saved</div>

<script>
const STORAGE_KEY = 'batesford-bi-tracker-v1';

const defaultData = {
  phases: [
    {
      id:'p1', name:'Guest WiFi Capture Portal', status:'done', budget:0, spend:0,
      tasks:[
        {t:'UniFi captive portal build', done:true, note:''},
        {t:'Supabase backend for visitor data', done:true, note:''},
        {t:'Postcode + email capture flow', done:true, note:''}
      ],
      timeLog:[], notes:'Already delivered — live in production.'
    },
    {
      id:'p2a', name:'Discovery & Integration Scoping', status:'not_started', budget:1200, spend:0,
      tasks:[
        {t:'Confirm Doshii API access & licensing', done:false},
        {t:'Validate Impos export capability', done:false},
        {t:'Define data schema for ETL pipeline', done:false}
      ],
      timeLog:[], notes:''
    },
    {
      id:'p2', name:'POS Sales Integration (Impos / Doshii)', status:'not_started', budget:5500, spend:0,
      tasks:[
        {t:'Connect Doshii / Impos data feed', done:false},
        {t:'Build ETL pipeline (item, qty, price, time)', done:false},
        {t:'Sales trends dashboard v1', done:false}
      ],
      timeLog:[], notes:''
    },
    {
      id:'p3', name:'Geographic + Sales Correlation', status:'not_started', budget:3500, spend:0,
      tasks:[
        {t:'Join postcode data with sales by date/time', done:false},
        {t:'Postcode revenue heatmap view', done:false},
        {t:'Targeted campaign trigger logic', done:false}
      ],
      timeLog:[], notes:''
    },
    {
      id:'p4', name:'Deputy Rostering Integration', status:'not_started', budget:4000, spend:0,
      tasks:[
        {t:'Connect Deputy API', done:false},
        {t:'Pull staff hours + labour cost', done:false},
        {t:'Staff efficiency metrics view', done:false}
      ],
      timeLog:[], notes:''
    },
    {
      id:'p5', name:'Analytics & Forecasting Engine', status:'not_started', budget:12000, spend:0,
      tasks:[
        {t:'Central Node.js middleware', done:false},
        {t:'Demand forecasting model', done:false},
        {t:'Event & seasonal impact analysis', done:false},
        {t:'Stock velocity + shrinkage detection', done:false}
      ],
      timeLog:[], notes:''
    },
    {
      id:'p6', name:'Custom Reporting & Dashboard Builder', status:'not_started', budget:7000, spend:0,
      tasks:[
        {t:'Star-schema data model rework', done:false},
        {t:'Filter + tile query builder UI', done:false},
        {t:'Saved layouts & scheduled report emails', done:false}
      ],
      timeLog:[], notes:''
    }
  ]
};

let data = null;

async function loadData(){
  try{
    const res = await fetch('/api/tracker');
    const body = await res.json();
    data = body.data ? body.data : defaultData;
  }catch(e){
    console.error('Load failed, using defaults', e);
    data = defaultData;
  }
  render();
}

async function saveData(){
  try{
    const res = await fetch('/api/tracker', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if(!res.ok) throw new Error('Save failed: ' + res.status);
    flashSaved();
  }catch(e){
    console.error('Save failed', e);
    flashSaved('Save failed');
  }
}

function flashSaved(msg){
  const el = document.getElementById('saveIndicator');
  el.textContent = msg || 'Saved';
  el.classList.add('show');
  clearTimeout(window._saveTimeout);
  window._saveTimeout = setTimeout(()=> el.classList.remove('show'), 1200);
}

function fmt(n){ return '$' + Number(n||0).toLocaleString(undefined,{maximumFractionDigits:0}); }

function computeSummary(){
  const totalBudget = data.phases.reduce((s,p)=>s+Number(p.budget||0),0);
  const totalSpend = data.phases.reduce((s,p)=>s+Number(p.spend||0),0);
  const totalHours = data.phases.reduce((s,p)=>s+p.timeLog.reduce((a,e)=>a+Number(e.hours||0),0),0);
  const allTasks = data.phases.reduce((s,p)=>s+p.tasks.length,0);
  const doneTasks = data.phases.reduce((s,p)=>s+p.tasks.filter(t=>t.done).length,0);
  const pctComplete = allTasks ? Math.round(doneTasks/allTasks*100) : 0;
  return {totalBudget,totalSpend,totalHours,pctComplete};
}

function renderSummary(){
  const s = computeSummary();
  const row = document.getElementById('summaryRow');
  row.innerHTML = `
    <div class="summary">
      <div class="lbl">Project budget</div>
      <div class="val">${fmt(s.totalBudget)}</div>
      <div class="sub">across 7 phases</div>
    </div>
    <div class="summary">
      <div class="lbl">Spend to date</div>
      <div class="val">${fmt(s.totalSpend)}</div>
      <div class="sub">${s.totalBudget ? Math.round(s.totalSpend/s.totalBudget*100) : 0}% of budget</div>
    </div>
    <div class="summary">
      <div class="lbl">Hours logged</div>
      <div class="val">${s.totalHours}h</div>
      <div class="sub">all phases</div>
    </div>
    <div class="summary">
      <div class="lbl">Overall progress</div>
      <div class="val">${s.pctComplete}%</div>
      <div class="progress-track"><div class="progress-fill" style="width:${s.pctComplete}%"></div></div>
    </div>
  `;
}

function statusLabel(s){
  return {not_started:'Not started', in_progress:'In progress', done:'Done'}[s] || s;
}
function nextStatus(s){
  return {not_started:'in_progress', in_progress:'done', done:'not_started'}[s];
}

function renderPhases(){
  const list = document.getElementById('phaseList');
  list.innerHTML = '';
  data.phases.forEach((p, idx) => {
    const div = document.createElement('div');
    div.className = 'phase' + (p._open ? ' open' : '');
    const doneTasks = p.tasks.filter(t=>t.done).length;
    const totalHrs = p.timeLog.reduce((a,e)=>a+Number(e.hours||0),0);

    div.innerHTML = `
      <div class="phase-head ${p.status}">
        <div class="phase-num">${String(idx).padStart(2,'0')}</div>
        <div class="phase-title">
          <h3 contenteditable="true" spellcheck="false" data-action="edit-name" data-id="${p.id}">${p.name}</h3>
          <div class="meta">${doneTasks}/${p.tasks.length} tasks · ${totalHrs}h logged</div>
        </div>
        <button class="status-pill ${p.status}" data-action="cycle-status" data-id="${p.id}">${statusLabel(p.status)}</button>
        <div class="phase-budget">${fmt(p.spend)} <span class="b">/ ${fmt(p.budget)}</span></div>
        <svg class="chev" data-action="toggle" data-id="${p.id}" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </div>
      <div class="phase-body">
        <div class="body-grid">
          <div>
            <div class="tasks">
              ${p.tasks.map((t,ti)=>`
                <div class="task ${t.done?'checked':''}">
                  <input type="checkbox" data-action="toggle-task" data-id="${p.id}" data-ti="${ti}" ${t.done?'checked':''}>
                  <div class="task-body">
                    <label class="task-title" data-action="toggle-task" data-id="${p.id}" data-ti="${ti}">${t.t}</label>
                    <textarea class="task-note" rows="1" placeholder="Add a note..." data-action="task-note" data-id="${p.id}" data-ti="${ti}">${t.note||''}</textarea>
                  </div>
                </div>
              `).join('')}
            </div>
            <div class="add-task-row">
              <input type="text" placeholder="Add a task..." class="new-task-input" data-id="${p.id}">
              <input type="text" placeholder="Note (optional)" class="new-task-note-input" data-id="${p.id}">
              <button data-action="add-task" data-id="${p.id}">Add</button>
            </div>
            <div style="margin-top:16px;">
              <div class="flbl" style="font-size:0.78rem; color:var(--text-dim); margin-bottom:6px;">Notes</div>
              <textarea class="notes-area" data-action="notes" data-id="${p.id}" placeholder="Notes on this phase...">${p.notes||''}</textarea>
            </div>
          </div>
          <div class="side-block">
            <div class="field-row">
              <span class="flbl">Budget</span>
              <input type="number" class="spend-input" data-action="budget" data-id="${p.id}" value="${p.budget}">
            </div>
            <div class="field-row">
              <span class="flbl">Actual spend</span>
              <input type="number" class="spend-input" data-action="spend" data-id="${p.id}" value="${p.spend}">
            </div>
            <div class="time-log">
              <div class="flbl" style="font-size:0.78rem; color:var(--text-dim); margin-bottom:8px;">Time log</div>
              <div class="time-entries">
                ${p.timeLog.length ? p.timeLog.map(e=>`
                  <div class="time-entry"><span>${e.date} — ${e.note||''}</span><span class="h">${e.hours}h</span></div>
                `).join('') : '<div class="time-entry"><span>No entries yet</span></div>'}
              </div>
              <div class="add-time">
                <input type="number" placeholder="hrs" step="0.5" class="time-hours-input" data-id="${p.id}">
                <input type="text" placeholder="What did you work on?" class="time-note-input" data-id="${p.id}">
                <button data-action="add-time" data-id="${p.id}">Log</button>
              </div>
            </div>
          </div>
        </div>
        <div class="phase-actions-row">
          <button class="delete-phase-btn" data-action="delete-phase" data-id="${p.id}">Delete this phase</button>
        </div>
      </div>
    `;
    list.appendChild(div);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-phase-btn';
  addBtn.dataset.action = 'add-phase';
  addBtn.textContent = '+ Add phase';
  list.appendChild(addBtn);
}

function render(){
  renderSummary();
  renderPhases();
}

function findPhase(id){ return data.phases.find(p=>p.id===id); }

document.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;

  if(action === 'toggle'){
    const p = findPhase(id); p._open = !p._open; render();
  }
  if(action === 'cycle-status'){
    const p = findPhase(id); p.status = nextStatus(p.status);
    p._open = true; render(); saveData();
  }
  if(action === 'toggle-task'){
    const p = findPhase(id); const ti = Number(btn.dataset.ti);
    p.tasks[ti].done = !p.tasks[ti].done; p._open = true; render(); saveData();
  }
  if(action === 'add-task'){
    const p = findPhase(id);
    const input = document.querySelector(`.new-task-input[data-id="${id}"]`);
    const noteInput = document.querySelector(`.new-task-note-input[data-id="${id}"]`);
    const val = input.value.trim();
    if(val){ p.tasks.push({t:val, done:false, note:(noteInput.value||'').trim()}); p._open = true; render(); saveData(); }
  }
  if(action === 'add-time'){
    const p = findPhase(id);
    const hoursInput = document.querySelector(`.time-hours-input[data-id="${id}"]`);
    const noteInput = document.querySelector(`.time-note-input[data-id="${id}"]`);
    const hours = parseFloat(hoursInput.value);
    if(hours > 0){
      const today = new Date().toISOString().slice(0,10);
      p.timeLog.push({date:today, hours, note:noteInput.value.trim()});
      p._open = true; render(); saveData();
    }
  }
  if(action === 'add-phase'){
    const newId = 'p_' + Date.now();
    data.phases.push({
      id:newId, name:'New phase', status:'not_started', budget:0, spend:0,
      tasks:[], timeLog:[], notes:'', _open:true
    });
    render(); saveData();
    setTimeout(()=>{
      const el = document.querySelector(`h3[data-action="edit-name"][data-id="${newId}"]`);
      if(el){ const range = document.createRange(); range.selectNodeContents(el);
        const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range); el.focus(); }
    }, 0);
  }
  if(action === 'delete-phase'){
    const p = findPhase(id);
    if(confirm(`Delete "${p.name}"? This removes its tasks, time log, and notes. This can't be undone.`)){
      data.phases = data.phases.filter(ph => ph.id !== id);
      render(); saveData();
    }
  }
});

document.addEventListener('keydown', (e) => {
  if(e.target.dataset && e.target.dataset.action === 'edit-name' && e.key === 'Enter'){
    e.preventDefault(); e.target.blur();
  }
});

document.addEventListener('focusout', (e) => {
  const el = e.target;
  if(el.dataset && el.dataset.action === 'edit-name'){
    const p = findPhase(el.dataset.id);
    const val = el.textContent.trim();
    p.name = val || p.name;
    saveData();
  }
});

document.addEventListener('change', (e) => {
  const el = e.target;
  if(el.dataset.action === 'budget'){
    findPhase(el.dataset.id).budget = parseFloat(el.value)||0; renderSummary(); saveData();
  }
  if(el.dataset.action === 'spend'){
    findPhase(el.dataset.id).spend = parseFloat(el.value)||0; renderSummary(); saveData();
  }
  if(el.dataset.action === 'notes'){
    findPhase(el.dataset.id).notes = el.value; saveData();
  }
  if(el.dataset.action === 'task-note'){
    const p = findPhase(el.dataset.id); const ti = Number(el.dataset.ti);
    p.tasks[ti].note = el.value; saveData();
  }
});

loadData();
</script>
