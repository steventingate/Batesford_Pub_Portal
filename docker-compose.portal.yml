services:
  wifi-portal:
    build:
      context: .
      dockerfile: portal-server/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: wifi-portal
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Australia/Melbourne
      NODE_ENV: production
      PORT: 3000
      SUPABASE_URL: ${SUPABASE_URL}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      WIFI_CONNECT_FUNCTION_URL: ${WIFI_CONNECT_FUNCTION_URL}
      UNIFI_AUTH_BACKEND: ${UNIFI_AUTH_BACKEND:-auto}
      UNIFI_AUTH_MODE: ${UNIFI_AUTH_MODE:-auto}
      UNIFI_BASE_URL: ${UNIFI_BASE_URL}
      UNIFI_V1_API_KEY: ${UNIFI_V1_API_KEY}
      UNIFI_V1_SITE_ID: ${UNIFI_V1_SITE_ID}
      UNIFI_V1_BASE_PATH: ${UNIFI_V1_BASE_PATH:-/proxy/network/integration/v1}
      UNIFI_USERNAME: ${UNIFI_USERNAME}
      UNIFI_PASSWORD: ${UNIFI_PASSWORD}
      UNIFI_SITE_NAME: ${UNIFI_SITE_NAME:-default}
      UNIFI_ALLOW_INVALID_TLS: ${UNIFI_ALLOW_INVALID_TLS:-true}
      UNIFI_AUTH_MINUTES: ${UNIFI_AUTH_MINUTES:-480}
      UNIFI_VERIFY_ATTEMPTS: ${UNIFI_VERIFY_ATTEMPTS:-5}
      UNIFI_VERIFY_DELAY_MS: ${UNIFI_VERIFY_DELAY_MS:-500}
      UNIFI_POST_AUTH_REFRESH_ENABLED: ${UNIFI_POST_AUTH_REFRESH_ENABLED:-true}
      UNIFI_POST_AUTH_REFRESH_DELAY_MS: ${UNIFI_POST_AUTH_REFRESH_DELAY_MS:-60000}
      UNIFI_V1_POST_AUTH_REFRESH_DELAY_MS: ${UNIFI_V1_POST_AUTH_REFRESH_DELAY_MS:-4500}
      RELEASE_REAUTH_MIN_INTERVAL_MS: ${RELEASE_REAUTH_MIN_INTERVAL_MS:-4000}
      PORTAL_DEFAULT_WEBSITE_URL: ${PORTAL_DEFAULT_WEBSITE_URL:-https://www.thebatesfordhotel.com.au/}
      PORTAL_BRAND_NAME: ${PORTAL_BRAND_NAME:-Batesford Guest Wi-Fi}
      PORTAL_SESSION_WINDOW_MINUTES: ${PORTAL_SESSION_WINDOW_MINUTES:-20}
      PORTAL_MAX_AUTO_RELEASE_ATTEMPTS: ${PORTAL_MAX_AUTO_RELEASE_ATTEMPTS:-20}
      PORTAL_RELEASE_RETRY_DELAY_MS: ${PORTAL_RELEASE_RETRY_DELAY_MS:-3000}
      PORTAL_SITE_MAP: ${PORTAL_SITE_MAP}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-proxy}
