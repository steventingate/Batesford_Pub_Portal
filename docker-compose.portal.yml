services:
  wifi-portal:
    build:
      context: .
      dockerfile: portal-server/Dockerfile
    container_name: wifi-portal
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      WIFI_CONNECT_FUNCTION_URL: ${WIFI_CONNECT_FUNCTION_URL}
      PORTAL_DEFAULT_WEBSITE_URL: ${PORTAL_DEFAULT_WEBSITE_URL:-https://www.thebatesfordhotel.com.au/}
      PORTAL_BRAND_NAME: ${PORTAL_BRAND_NAME:-Batesford Guest Wi-Fi}
      PORTAL_SESSION_WINDOW_MINUTES: ${PORTAL_SESSION_WINDOW_MINUTES:-20}
      PORTAL_SITE_MAP: ${PORTAL_SITE_MAP}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-proxy}
