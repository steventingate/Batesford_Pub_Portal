[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  
[build.environment]
  NPM_FLAGS = "--include=dev"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/connect"
  to = "https://batesfordguestwifi.gearedit.com.au/portal?site=xlgkkyrq"
  status = 302

[[redirects]]
  from = "/portal"
  to = "https://batesfordguestwifi.gearedit.com.au/portal?site=xlgkkyrq"
  status = 302

[[redirects]]
  from = "/connect/submit"
  to = "/.netlify/functions/captiveConnect"
  status = 200
  force = true

[[redirects]]
  from = "/connect/status"
  to = "/.netlify/functions/captiveStatus"
  status = 200
  force = true

[[redirects]]
  from = "/connect/timing"
  to = "/.netlify/functions/captiveTiming"
  status = 200
  force = true

[[redirects]]
  from = "/api/unifi/authorize-test"
  to = "/.netlify/functions/unifiAuthorizeTest"
  status = 200
  force = true

[[redirects]]
  from = "/api/unifi/deauthorize-test"
  to = "/.netlify/functions/unifiDeauthorizeTest"
  status = 200
  force = true

[[redirects]]
  from = "/connect/health"
  to = "/.netlify/functions/captiveHealth"
  status = 200
  force = true

[[redirects]]
  from = "/guest/*"
  to = "https://batesfordguestwifi.gearedit.com.au/guest/:splat"
  status = 302

[[redirects]]
  from = "/"
  to = "/admin"
  status = 302
